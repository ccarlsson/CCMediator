name: CI
on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
      - name: Restore
        run: dotnet restore SimpleMediator.sln
      - name: Build
        run: dotnet build SimpleMediator.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test SimpleMediator.sln --configuration Release --no-build --collect:"XPlat Code Coverage" --logger trx
